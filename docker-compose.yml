version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: highlander-today-db
    environment:
      POSTGRES_DB: highlander_today
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: